<script>

const db=
(
JSON.parse(
localStorage.getItem(
"kanjiDB"
)
)||[]
)

.filter(
item=>
item &&
item.kanji &&
item.kanji.trim()!==""
);

const grid=
document.getElementById(
"grid"
);

db.forEach(
(item,index)=>{

const card=
document.createElement(
"div"
);

card.className=
"card";

card.innerHTML=`

<div class="cardTop">
No.${index+1}
</div>

<div class="cardBody">
${item.kanji}
</div>

`;

card.onclick=()=>{

localStorage.setItem(
"selectedKanji",
item.kanji
);

location.href=
"index.html";

};

grid.append(card);

});

</script>
